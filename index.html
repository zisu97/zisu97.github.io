<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>zisu97 的个人主页</title>
    <style>
        body { font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; color: #333; }
        .container { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 600px; text-align: center; }
        h1 { color: #667eea; margin-bottom: 10px; }
        p { color: #666; line-height: 1.6; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 48px; color: white; }
        .links { margin-top: 30px; }
        .links a { display: inline-block; margin: 10px; padding: 10px 20px; background: #667eea; color: white; text-decoration: none; border-radius: 25px; transition: transform 0.2s; }
        .links a:hover { transform: translateY(-3px); }
        .footer { margin-top: 30px; font-size: 12px; color: #999; }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">👤</div>
        <h1>你好，我是 zisu97</h1>
        <p>欢迎来到我的个人主页！这里将展示我的项目、笔记和分享。</p>
        <div class="links">
            <a href="https://github.com/zisu97">GitHub</a>
            <a href="#">我的项目</a>
            <a href="#">联系我</a>
        </div>
        <div class="footer">Powered by GitHub Pages • 2026</div>
    </div>
</body>
</html>
